<meta charset="utf-8">
<title>水晶傳說 設定集</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&family=Cinzel:wght@600&display=swap">
<style>
:root{
  color-scheme:dark;
  --bg:#0a0e1d; --ink:#e8edfb; --mut:#96a3c6; --dim:#8ea0c9; --faint:#5f6d95;
  --acc:#7fd8ea; --acc-hi:#aee8f4; --pur:#a79bf2; --gold:#e7c374; --gold-dim:#c9b892;
  --bad:#f09090; --hp:#7fdea3; --mp:#86b4f4;
  --line:#253156; --line-2:#2a3760; --line-soft:#1f2b4e; --line-dash:#2c3a63; --line-row:#1d2848;
  --card:linear-gradient(160deg,#141c36,#101627); --key:linear-gradient(160deg,#191c3a,#12162b);
  --code:#0e1428; --input:#0e1530;
  --serif:"Noto Serif TC","Songti TC","PingFang TC",serif;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
  --latin:"Cinzel",serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.7 var(--sans);
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(1100px 500px at 85% -100px,rgba(127,216,234,.10),transparent 60%),
    radial-gradient(900px 600px at -10% 30%,rgba(167,155,242,.08),transparent 55%);
  background-attachment:fixed}
a{color:var(--acc);text-decoration:none}
a:hover{color:var(--acc-hi);text-decoration:underline}
::selection{background:rgba(127,216,234,.28)}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:4px}
@keyframes cxIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important}}

/* ── header ── */
header.top{position:sticky;top:0;z-index:60;background:rgba(9,13,26,.88);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft)}
.hdr-in{max-width:1220px;margin:0 auto;padding:12px 24px 0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;flex:none}
.gem{width:26px;height:26px;position:relative;flex:none}
.gem::before{content:"";position:absolute;inset:4px;transform:rotate(45deg);border-radius:3px;
  background:linear-gradient(135deg,var(--acc),var(--pur) 80%);box-shadow:0 0 14px rgba(127,216,234,.5);
  animation:gem 4.5s ease-in-out infinite}
@keyframes gem{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
.brand .t{font-family:var(--serif);font-weight:900;font-size:19px;letter-spacing:.06em;line-height:1.2}
.brand .t span{color:var(--acc)}
.brand .s{font-family:var(--latin);font-size:9.5px;letter-spacing:.3em;color:var(--dim)}
.search{position:relative;flex:1;min-width:200px;max-width:400px}
.search input{width:100%;padding:8px 30px 8px 12px;border:1px solid var(--line-2);border-radius:10px;
  background:var(--input);color:var(--ink);font:13px/1.4 var(--sans);outline:none}
.search input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(127,216,234,.12)}
.search input::placeholder{color:var(--faint)}
.search .clr{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:none;
  color:var(--dim);font-size:15px;cursor:pointer;padding:2px 6px;display:none}
.search.hasq .clr{display:block}
.hdr-r{display:flex;align-items:center;gap:10px;flex:none;margin-left:auto}
.hits{font-family:var(--mono);font-size:11.5px;color:var(--acc);display:none}
.search.hasq~.hdr-r .hits{display:inline}
.mode{display:flex;align-items:center;gap:7px;border:1px solid var(--line-2);background:#111a38;color:#c3cdea;
  font:12.5px var(--sans);padding:7px 13px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:border-color .2s,color .2s}
.mode:hover{border-color:var(--acc);color:var(--ink)}
nav.tabs{max-width:1220px;margin:0 auto;padding:9px 24px 11px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
nav.tabs button{flex:none;border:1px solid #242f52;background:transparent;color:var(--mut);
  font:500 13px var(--sans);padding:6px 14px;border-radius:9px;cursor:pointer;white-space:nowrap;transition:color .15s}
nav.tabs button:hover{color:var(--ink)}
nav.tabs button.on{color:#0b1020;background:linear-gradient(135deg,var(--acc),var(--pur));border-color:transparent;font-weight:700}

main{max-width:1220px;margin:0 auto;padding:8px 24px 100px}

/* ── hero ── */
.hero{position:relative;margin-top:26px;border:1px solid #263256;border-radius:16px;overflow:hidden;
  background:linear-gradient(160deg,#141c36,#0f1529);min-height:210px;display:flex;align-items:center;animation:cxIn .5s ease}
.hero img{position:absolute;top:-8%;right:2%;height:125%;width:auto;object-fit:contain;opacity:.5;
  -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 45%);mask-image:linear-gradient(90deg,transparent 0,#000 45%)}
.hero .in{position:relative;z-index:1;padding:30px 34px;max-width:62ch}
.hero .kick{font-family:var(--latin);font-size:11px;letter-spacing:.28em;color:var(--acc);margin-bottom:8px}
.hero h1{font-family:var(--serif);font-weight:900;font-size:31px;margin:0 0 10px;letter-spacing:.05em;text-wrap:balance}
.hero p{margin:0 0 15px;color:#96a3c6;max-width:52ch;text-wrap:pretty}
.metarow{display:flex;flex-wrap:wrap;gap:6px}

/* ── sections ── */
.sec{margin-top:46px;scroll-margin-top:124px;animation:cxIn .45s ease}
.sec+.sec,.sec~.sec{margin-top:56px}
.sec-h{display:flex;align-items:baseline;gap:11px}
.sec-h::before{content:"◆";color:var(--acc);font-size:13px;align-self:center;line-height:1}
.sec.pur .sec-h::before{color:var(--pur)}
.sec.gold .sec-h::before{color:var(--gold)}
.sec-h h2{font-family:var(--serif);font-weight:900;font-size:24px;margin:0;letter-spacing:.05em}
.sec-h .en{font-family:var(--latin);font-size:12px;letter-spacing:.3em;color:#8b82c9}
.sec.gold .sec-h .en{color:#b3a075}
.sec-h .cnt{font-family:var(--mono);font-size:12px;color:var(--mut);font-weight:400}
.lead{color:var(--mut);font-size:13px;margin:6px 0 18px;max-width:80ch}
.lead b{color:#c3cdea}
h3.sub{font-family:var(--serif);font-size:17px;margin:28px 0 12px}
h4{font-family:var(--serif);font-size:16px;margin:0}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.grid-npc{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(440px,100%),1fr));gap:12px;align-items:start}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.card h4{margin-bottom:6px;color:var(--ink);font-size:14px}
.card p{margin:0;color:var(--mut);font-size:12.5px}

/* ── chips / colour utils ── */
.chip{display:inline-flex;font-family:var(--mono);font-size:11px;line-height:1;padding:4px 9px;border-radius:999px;
  border:1px solid var(--line-2);color:var(--mut);background:rgba(150,163,198,.06);white-space:nowrap;vertical-align:middle}
.chip.acc{color:var(--acc);border-color:rgba(127,216,234,.35);background:rgba(127,216,234,.07)}
.chip.pur{color:var(--pur);border-color:rgba(167,155,242,.4);background:rgba(167,155,242,.08)}
.chip.gold{color:var(--gold);border-color:rgba(231,195,116,.4);background:rgba(231,195,116,.07)}
.chip.bad{color:var(--bad);border-color:rgba(240,144,144,.4);background:rgba(240,144,144,.07)}
.chip.hp{color:var(--hp);border-color:rgba(127,222,163,.4);background:rgba(127,222,163,.07)}
.chip.mp{color:var(--mp);border-color:rgba(134,180,244,.4);background:rgba(134,180,244,.07)}
.chip.sm{font-size:10.5px;padding:3px 8px}
.c-mut{color:var(--mut)}.c-dim{color:var(--dim)}.c-faint{color:var(--faint)}.c-ink{color:var(--ink)}
.c-acc{color:var(--acc)}.c-pur{color:var(--pur)}.c-gold{color:var(--gold)}.c-gdim{color:var(--gold-dim)}
.c-bad{color:var(--bad)}.c-hp{color:var(--hp)}.c-mp{color:var(--mp)}
.id{font-family:var(--mono);font-size:11px;color:var(--faint)}
.mono{font-family:var(--mono)}

/* ── tables ── */
.tw{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
.tbl th{text-align:left;font-size:11px;letter-spacing:.08em;color:var(--dim);font-weight:600;padding:8px 12px;
  border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:7px 12px;border-top:1px solid var(--line-row);vertical-align:top}
.tbl td.num{text-align:right;font-family:var(--mono);font-size:12px;white-space:nowrap}
.tbl .surface,.surface{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}

pre{background:var(--code);border:1px solid #223055;border-radius:12px;padding:14px 16px;overflow-x:auto;
  font-family:var(--mono);font-size:12.2px;line-height:1.8;margin:0 0 8px;white-space:pre;color:#c3cdea}
code{font-family:var(--mono);font-size:12px;color:var(--acc)}

/* ── expandable rows (party / key / npc / foe / story) ── */
.rows{display:flex;flex-direction:column;gap:12px}
.row{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:border-color .25s}
.row.key{background:var(--key)}
.row .head{display:flex;gap:16px;align-items:center;padding:14px 18px 14px 14px;cursor:pointer;flex-wrap:wrap}
.row .head:hover{background:rgba(127,216,234,.04)}
.row.key .head:hover,.row.pur .head:hover{background:rgba(167,155,242,.05)}
.row.foe .head:hover{background:rgba(231,195,116,.05)}
.face{width:88px;height:88px;object-fit:cover;border-radius:12px;border:1px solid var(--line-2);flex:none;background:#0e1428}
.rbi{height:100px;overflow:hidden;flex:none;display:flex;align-items:flex-end}
.rbi img{height:100%;width:auto;display:block}
.rbi.none{width:76px;border:1.5px dashed var(--line-dash);border-radius:10px;display:flex;align-items:center;
  justify-content:center;color:var(--faint);font-size:10.5px;text-align:center;line-height:1.4}
.meta{flex:1;min-width:240px}
.meta .nm{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.meta .nm b{font-family:var(--serif);font-weight:900;font-size:20px;letter-spacing:.04em}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0 8px}
.meta .lead2{margin:0;color:var(--mut);font-size:13px;max-width:66ch;text-wrap:pretty}
.chev{flex:none;color:var(--acc);font-size:13px;transition:transform .25s}
.row.pur .chev,.row.key .chev{color:var(--pur)}
.row.foe .chev{color:var(--gold)}
.exp{border-top:1px solid var(--line-soft);padding:22px;display:flex;gap:26px;flex-wrap:wrap;background:rgba(10,15,32,.5);animation:cxIn .3s ease}
.exp.key{border-top-color:#23204a}
.exp .art{flex:1 1 260px;min-width:230px;max-width:380px;display:flex;align-items:flex-start;justify-content:center;
  background:radial-gradient(340px 300px at 50% 32%,rgba(127,216,234,.10),transparent 70%);border-radius:12px;padding:8px}
.exp.pur .art{background:radial-gradient(340px 300px at 50% 32%,rgba(167,155,242,.12),transparent 70%)}
.exp .art img{max-width:100%;max-height:520px;width:auto;height:auto;display:block;filter:drop-shadow(0 14px 28px rgba(0,0,0,.5))}
.exp .info{flex:2 1 380px;min-width:280px}
.exp h5{margin:0 0 8px;font-size:13px;color:var(--acc);letter-spacing:.12em;font-weight:700}
.exp.pur h5{color:var(--pur)}
.exp h5.mt{margin-top:16px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:7px}
.tile{background:var(--code);border:1px solid #223055;border-radius:10px;padding:7px 11px}
.tile .k{font-size:10.5px;color:var(--dim);letter-spacing:.06em}
.tile .v{font-family:var(--mono);font-size:15px}
.eqline{display:flex;flex-wrap:wrap;gap:6px}
.skline{display:flex;gap:9px;align-items:baseline;font-size:12.5px;flex-wrap:wrap}
.storybox{margin:18px 0 0;padding:12px 16px;border-left:2px solid var(--pur);background:var(--code);
  border-radius:0 10px 10px 0;font-size:12.8px;color:var(--mut);line-height:1.85}

/* npc grid card */
.ncard{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.ncard .head{display:flex;gap:14px;padding:14px;cursor:pointer}
.ncard .head:hover{background:rgba(127,216,234,.04)}
.ncard .face{width:72px;height:72px;border-radius:11px}
.ncard .nm{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.ncard .nm b{font-family:var(--serif);font-weight:900;font-size:16px}
.ncard .role{font-size:12px;color:var(--dim);margin:1px 0 6px}
.gift{margin-top:8px;padding:6px 11px;border-left:2px solid var(--gold);background:var(--code);
  border-radius:0 8px 8px 0;font-size:12px;color:var(--gold)}
.nexp{border-top:1px solid var(--line-soft);padding:16px;display:flex;justify-content:center;
  background:radial-gradient(300px 260px at 50% 30%,rgba(167,155,242,.10),transparent 70%);animation:cxIn .3s ease}
.nexp img{max-width:100%;max-height:460px;width:auto;height:auto;display:block;filter:drop-shadow(0 12px 24px rgba(0,0,0,.5))}
.stub{border:1.5px dashed var(--line-dash);border-radius:16px;min-height:90px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;color:var(--faint);font-size:12.5px;padding:16px;text-align:center}

/* ── foe ── */
.foe .thumb{flex:none;width:64px;height:64px;border-radius:10px;border:1px solid #223055;background:#0e1428;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.foe .thumb.parch{background:#ece0bf;border-color:#c9b98b}
.foe .thumb img{max-width:86%;max-height:86%;width:auto;height:auto}
.foe .head{padding:11px 16px 11px 12px;align-items:center}
.foe .meta{min-width:220px}
.foe .fstats{display:flex;flex-wrap:wrap;gap:5px;flex:none;max-width:330px;justify-content:flex-end}
.foe .exp{padding:22px 24px;flex-direction:column;gap:0}
.foe .exp .bar{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--line-2);padding-bottom:9px}
.foe .exp .bar b{font-family:var(--serif);font-weight:900;font-size:21px;letter-spacing:.06em}
.foe .exp .body{display:flex;gap:24px;flex-wrap:wrap;margin-top:16px}
.foe .artcol{flex:1 1 240px;min-width:200px;max-width:340px;display:flex;flex-direction:column;gap:9px;align-items:center}
.poster{background:linear-gradient(165deg,#f2e8cc,#e6d7b0);border:1px solid #c9b98b;border-radius:6px;
  padding:14px 14px 10px;box-shadow:inset 0 0 40px rgba(122,92,34,.2),0 8px 20px rgba(0,0,0,.4);
  width:100%;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;gap:6px}
.poster img{max-width:100%;max-height:300px;width:auto;height:auto;mix-blend-mode:multiply;transform:rotate(-.6deg)}
.poster .w{font-family:var(--latin);font-weight:600;font-size:17px;letter-spacing:.4em;color:#3b3121;text-indent:.4em}
.foeport{display:flex;justify-content:center;width:100%;border-radius:12px;padding:8px;box-sizing:border-box;
  background:radial-gradient(300px 260px at 50% 34%,rgba(231,195,116,.10),transparent 70%)}
.foeport img{max-width:100%;max-height:320px;width:auto;height:auto;filter:drop-shadow(0 12px 24px rgba(0,0,0,.5))}
.noart{width:100%;height:220px;border:1.5px dashed var(--line-dash);border-radius:12px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;color:var(--faint);font-size:12px;box-sizing:border-box}
.itoggle{display:flex;gap:6px}
.itoggle button{flex:none;white-space:nowrap;border:1px solid var(--line-2);background:transparent;color:var(--mut);
  font:11px var(--mono);padding:5px 12px;border-radius:999px;cursor:pointer}
.itoggle button.on{color:#0b1020;background:linear-gradient(135deg,var(--gold),#c9a052);border-color:transparent}
.foe .desc{margin:0 0 12px;font-size:13.5px;line-height:1.85;color:#c3cdea;text-wrap:pretty}
.bigstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:7px}
.bigstats .tile{border-radius:8px;padding:6px 10px}
.bigstats .tile .v{font-weight:600;color:var(--ink)}
.foenote{margin-top:10px;padding:8px 12px;background:var(--code);border:1px dashed var(--line-dash);border-radius:8px;font-size:12.5px;color:#c3cdea}
.pxfig{flex:none;align-self:flex-end;display:flex;flex-direction:column;align-items:center;gap:5px}
.pxfig img{height:84px;width:auto;image-rendering:pixelated}
.pxfig span{font-size:10px;color:var(--dim);letter-spacing:.1em}

/* ── collapsible group (eq / item) ── */
.grp{margin-bottom:14px}
.grp .gh{display:flex;align-items:baseline;gap:10px;cursor:pointer;padding:6px 2px}
.grp .gh:hover{color:var(--acc)}
.grp .gh .gchev{color:var(--acc);font-size:11px;display:inline-block;transition:transform .25s}
.grp .gh h4{font-size:17px}
.grp .gh .cnt{font-family:var(--mono);font-size:11.5px;color:var(--mut)}

/* ── world / flow / formula ── */
.flow{display:flex;flex-direction:column}
.step{display:flex;gap:14px;position:relative;padding-bottom:18px}
.step .dot{flex:none;width:14px;height:14px;margin-top:5px;transform:rotate(45deg);
  background:rgba(127,216,234,.15);border:1.5px solid var(--acc);border-radius:3px}
.step .t{font-size:13px;color:var(--mut)}
.step .t b{font-size:14px;color:var(--ink)}
.mapenc{display:flex;gap:8px;font-size:12px;padding:3px 0;border-top:1px dashed var(--line-row)}
.formula{margin-bottom:22px}
.formula h4{font-size:16px;margin:0 0 8px}
.formula h4 .no{font-family:var(--mono);font-size:12px;color:var(--gold);margin-right:8px}
.formula p{margin:0;color:var(--mut);font-size:12.5px;max-width:80ch}

/* ── story ── */
.scard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.scard .sh{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;flex-wrap:wrap}
.scard .sh:hover{background:rgba(167,155,242,.05)}
.scard .sh .schev{color:var(--pur);font-size:11px;transition:transform .25s}
.scard .sbody{border-top:1px solid var(--line-soft);padding:14px 18px;display:flex;flex-direction:column;gap:7px;animation:cxIn .25s ease}
.line{display:flex;gap:12px;font-size:13px}
.line .spk{flex:none;width:82px;text-align:right;color:var(--pur);font-weight:700;font-size:12.5px}
.dlgbody{border-top:1px solid var(--line-soft);padding:6px 18px 14px;animation:cxIn .25s ease}
.dlge{border-top:1px dashed var(--line-row);padding:11px 0}
.dlge .cond{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.dlge .l{margin:2px 0 2px 8px}

footer{margin-top:72px;border-top:1px solid var(--line-soft);padding-top:16px;font-size:11.5px;color:var(--faint)}
.empty{color:var(--faint);font-size:13px;padding:40px 0}

@media (max-width:720px){
  .hdr-in{padding:12px 16px 0}
  nav.tabs{padding:9px 16px 11px}
  main{padding:8px 16px 80px}
  .row .head{flex-wrap:wrap}
  .meta{flex:1 0 100%;order:3;min-width:0}
}
</style>

<header class="top">
  <div class="hdr-in">
    <div class="brand">
      <div class="gem" aria-hidden="true"></div>
      <div>
        <div class="t">水晶傳說 <span>設定資料庫</span></div>
        <div class="s">TALE OF CRYSTAL · TEAM CODEX</div>
      </div>
    </div>
    <div class="search" id="sbox">
      <input id="q" type="search" placeholder="全域搜尋：名稱、ID、台詞、數值…（/ 聚焦）" aria-label="全域搜尋">
      <button class="clr" id="qc" title="清除搜尋" aria-label="清除搜尋">×</button>
    </div>
    <div class="hdr-r">
      <span class="hits" id="hits" aria-live="polite"></span>
      <button class="mode" id="modeBtn" title="切換版面模式"></button>

const STATL={patk:"物攻",pdef:"物防",matk:"魔攻",mdef:"魔防",crit:"會心%",dodge:"閃避%",hp:"HP",mp:"MP"};

const foeName=id=>foeById[id]?foeById[id].name:id;
const mapName=id=>mapMeta[id]?mapMeta[id].name:(evMeta[id]?evMeta[id].name:id);
function eqStat(eq,k){let s=0;for(const sl in eq){const e=eqById[eq[sl]];if(e&&e.stats&&e.stats[k])s+=e.stats[k];}return s;}
const d0=GAME.derived;
function derive(p){
  const a=p.base,eq=p.eq,r={};
  r.maxhp=d0.hpBase+a.str*d0.hpPerStr+eqStat(eq,"hp");
  r.maxmp=d0.mpBase+a.int*d0.mpPerInt+eqStat(eq,"mp");
  r.patk=d0.weaponAtk+a[p.main]*2+eqStat(eq,"patk");
  r.matk=Math.round(a.int*d0.matkPerInt)+eqStat(eq,"matk");
  r.pdef=a.str+eqStat(eq,"pdef");
  r.mdef=Math.round(a.int*d0.mdefPerInt)+eqStat(eq,"mdef");
  r.dodge=Math.round(a.agi*d0.dodgePerAgi)+eqStat(eq,"dodge");
  r.crit=Math.round((d0.critBase+a.agi*d0.critPerAgi+eqStat(eq,"crit"))*10)/10;
  r.spd=a.agi;
  return r;
}
const expNeed=lv=>d0.expBase+Math.round(d0.expCoef*Math.pow(lv,d0.expPow));

function render(){
  const st=state,q=(st.q||"").trim().toLowerCase(),hasQ=!!q,mode=st.mode||"tabs",tab=st.tab;
  const g=GAME,dg=DLG;
  const mm=h=>!q||h.indexOf(q)>=0;
  let hits=0;

  /* ── party ── */
  const party=g.party.map(p=>{
    const pm=META.partyMeta[p.id]||{};
    const dv=derive(p);
    const hay=[p.id,p.name,p.cls,pm.role,pm.trait,(p.story||[]).join("")].join(" ").toLowerCase();
    if(!mm(hay))return null; hits++;
    const open=!!st.open["p_"+p.id];
    const gr=p.growth?Object.entries(p.growth):null;
    const gOf=k=>{if(!gr)return"固定";const f=gr.find(x=>x[0]===k);return f?"+"+fmt(f[1])+"/級":"—";};
    const battle=IMG["bi_"+p.id]||null;
    let tags=chip(CLSN[p.cls]+" "+p.cls,"acc")+chip("主屬 "+p.main.toUpperCase(),"pur")+chip("Lv"+p.lv+" 起始");
    if(pm.role)tags+=chip(pm.role,"gold"); if(pm.trait)tags+=chip(pm.trait); if(p.guest)tags+=chip("客座 guest","bad");
    const attrs=[["STR 力量",p.base.str,gOf("str")],["AGI 敏捷",p.base.agi,gOf("agi")],["INT 智力",p.base.int,gOf("int")],["LUCK 幸運",p.base.luck,"—"]]
      .map(([k,v,gg])=>`<div class="tile"><div class="k">${k}</div><div class="v">${fmt(v)} <span class="c-hp" style="font-size:11px">${gg}</span></div></div>`).join("");
    const dv2=[["HP",dv.maxhp,"c-hp"],["MP",dv.maxmp,"c-mp"],["物攻",dv.patk,""],["魔攻",dv.matk,""],["物防",dv.pdef,""],["魔防",dv.mdef,""],["閃避",dv.dodge,""],["會心%",dv.crit,"c-gold"],["速度",dv.spd,""]]
      .map(([k,v,c])=>`<div class="tile"><div class="k">${k}</div><div class="v ${c}">${fmt(v)}</div></div>`).join("");
    const eqs=Object.entries(p.eq||{}).map(([sl,id])=>{const e=eqById[id];return`<span class="chip" title="${esc(e?statTxt(e.stats):"")}">${SLOTL[sl]||sl}｜${esc(e?e.name:id)}</span>`;}).join("");
    const skills=g.skills.filter(s=>s.cls===p.cls).map(s=>`<div class="skline"><span class="id">Lv${s.lv}</span><b class="c-ink">${esc(s.name)}</b><span class="c-mp mono" style="font-size:10.5px">MP ${s.mp}</span><span class="c-mut mono" style="font-size:11px">${(s.kind==="heal"?"治療":"傷害")+" = "+(s.attr==="int"?"魔攻":"物攻")+"×"+s.mult+" + "+fmt(s.flat)}</span></div>`).join("");
    const story=(p.story||[]).map(l=>`<div class="${l.indexOf("「")===0?"c-ink":"c-mut"}">${esc(l)}</div>`).join("");
    const biW=Math.round(100*(pm.frameAspect||0.9));
    const biCell=battle
      ? `<div class="rbi" style="width:${biW}px" title="戰鬥待機圖（單幀）"><img src="${battle}" alt="${esc(p.name)} 戰鬥待機" loading="lazy"></div>`
      : `<div class="rbi none">待機圖<br>未備</div>`;
    return `<div class="row${open?" open":""}" style="${open?"border-color:rgba(127,216,234,.45)":""}">
      <div class="head" data-act="tg" data-id="p_${p.id}" role="button" tabindex="0">
        ${faceHtml(p.id,p.name)}
        ${biCell}
        <div class="meta"><div class="nm"><b>${esc(p.name)}</b><span class="id">${p.id}</span></div>
          <div class="tags">${tags}</div>
          <p class="lead2">${esc((p.story&&p.story[0])||"")}</p></div>
        <div class="chev" style="transform:rotate(${open?0:-90}deg)">▾</div>
      </div>
      ${open?`<div class="exp">
        <div class="art"><img src="${IMG["mn_"+p.id]||IMG["p_"+p.id]||""}" alt="${esc(p.name)} 全身立繪" loading="lazy"></div>
        <div class="info">
          <h5>基礎屬性・成長</h5><div class="tiles">${attrs}</div>
          <h5 class="mt">衍生數值（Lv${p.lv}・含初始裝備）</h5><div class="tiles">${dv2}</div>
          <h5 class="mt">初始裝備</h5><div class="eqline">${eqs}</div>
          <h5 class="mt">習得技能（${CLSN[p.cls]||p.cls} 系）</h5><div style="display:flex;flex-direction:column;gap:5px">${skills}</div>
          <div class="storybox">${story}</div>
        </div></div>`:""}
    </div>`;
  }).filter(Boolean);

  /* ── key characters ── */
  const keys=(META.keyChars||[]).map(k=>{
    const hay=[k.id,k.name,k.role,k.desc,(k.tags||[]).join("")].join(" ").toLowerCase();
    if(!mm(hay))return null; hits++;
    const open=!!st.open["k_"+k.id];
    const tags=(k.tags||[]).map(t=>chip(t)).join("");
    return `<div class="row key${open?" open":""}" style="${open?"border-color:rgba(167,155,242,.55)":""}">
      <div class="head" data-act="tg" data-id="k_${k.id}" role="button" tabindex="0">
        ${faceHtml(k.id,k.name,"border-color:#35306b")}
        <div class="meta"><div class="nm"><b>${esc(k.name)}</b><span class="id">${k.id}</span></div>
          <div class="tags">${chip(k.role,"pur")}${tags}</div>
          <p class="lead2">${esc(k.desc.split("。")[0]+"。")}</p></div>
        <div class="chev" style="transform:rotate(${open?0:-90}deg)">▾</div>
      </div>
      ${open?`<div class="exp key pur">
        <div class="art"><img src="${IMG["p_"+k.id]||""}" alt="${esc(k.name)} 全身立繪" loading="lazy"></div>
        <div class="info"><h5>定位</h5><p class="c-ink" style="margin:0 0 4px;font-size:13.5px">${esc(k.role)}</p>
          <div class="storybox">${esc(k.desc)}</div></div></div>`:""}
    </div>`;
  }).filter(Boolean);

  /* ── npc ── */
  const npcs=(META.npcs||[]).map(n=>{
    const hay=[n.id,n.name,n.role,n.desc,n.gift||"",(n.fn||[]).join("")].join(" ").toLowerCase();
    if(!mm(hay))return null; hits++;
    const open=!!st.open["n_"+n.id];
    const dlgCnt=(dg.dlg[n.id]||[]).length;
    const fns=(n.fn||[]).map(f=>chip(f,"acc sm")).join("")+chip("台詞 "+dlgCnt+" 組","sm");
    return `<div class="ncard">
      <div class="head" data-act="tg" data-id="n_${n.id}" role="button" tabindex="0">
        ${faceHtml(n.id,n.name)}
        <div class="meta" style="min-width:0">
          <div class="nm"><b>${esc(n.name)}</b><span class="id">${n.id}</span><span class="chev" style="margin-left:auto;transform:rotate(${open?0:-90}deg)">▾</span></div>
          <div class="role">${esc(n.role)}</div>
          <div class="tags" style="margin:0 0 6px">${fns}</div>
          <p class="c-mut" style="margin:0;font-size:12.5px">${esc(n.desc)}</p>
          ${n.gift?`<div class="gift">贈禮：<span class="c-gdim">${esc(n.gift)}</span></div>`:""}
        </div>
      </div>
      ${open?`<div class="nexp"><img src="${IMG["p_"+n.id]||""}" alt="${esc(n.name)} 全身立繪" loading="lazy"></div>`:""}
    </div>`;
  }).filter(Boolean);

  /* ── foes ── */
  const encMapIds=Object.keys(g.encounters);
  const habitatsOf=fid=>encMapIds.filter(mid=>g.encounters[mid].some(gr=>gr.members.some(m=>m.id===fid)));
  const foes=g.enemies.map(f=>{
    const art=(META.foeArt||{})[f.id]||{};
    const desc=(META.foeDesc||{})[f.id]||"";
    const drops=(f.drops||[]).map(([id,r])=>{const it=itemById[id],nm=it?it.name:id;if(it&&it.baseDrop>0){const pct=Math.round(Math.min(1,r*it.baseDrop)*1000)/10;return nm+" "+pct+"%（×"+r+"）";}return nm+"（×"+r+"）";});
    const hab=habitatsOf(f.id).map(mapName);
    const hay=[f.id,f.name,f.spr,desc,drops.join(""),hab.join("")].join(" ").toLowerCase();
    if(!mm(hay))return null; hits++;
    const open=!!st.open["f_"+f.id];
    // 圖片走 build_img 動態掃到的 IMG（assets-source/role/enemies 有檔就顯示）；
    // foeArt 只用來覆蓋「戰鬥像素圖沿用別隻」的敵人（art.c）。
    const bounty=IMG["bounty_"+f.id]||null;
    const combat=IMG["combat_"+(art.c||f.id)]||null;
    const portrait=IMG["p_"+f.id]||null;
    const useFace=!combat&&!!IMG["face_"+f.id];
    const thumb=combat||(useFace?IMG["face_"+f.id]:bounty)||"";
    const onParch=!combat&&!useFace;
    const imgSel=portrait&&st.open["fi_"+f.id]!=="b"?"p":"b";
    let feats="";
    if(f.big)feats+=chip("☠ BOSS","bad sm"); if(f.allAttack)feats+=chip("全體攻擊 30%","bad sm"); if(f.healer)feats+=chip("治療者","hp sm");
    const fstats=chip("HP "+fmt(f.hp),"hp")+chip("ATK "+fmt(f.atk))+chip("DEF "+fmt(f.def))+chip("SPD "+fmt(f.spd))+chip("EXP "+(f.exp||0),"pur")+chip(f.gold+" G","gold");
    const bigStats=[["HP",f.hp],["ATK",f.atk],["DEF",f.def],["SPD",f.spd],["魔防(DEF×0.5)",f.def*0.5],["閃避(SPD×1.5)",f.spd*1.5]]
      .map(([k,v])=>`<div class="tile"><div class="k">${k}</div><div class="v">${fmt(v)}</div></div>`).join("");
    const fsk=f.foeSkills?f.foeSkills.map(s=>s.name+"（"+(s.target==="all"?"全體":"單體")+"・phys×"+s.mult+"）").join("　"):null;
    const note=(META.foeNotes||{})[f.id]||null;
    let artcol;
    if(imgSel==="b"&&bounty){artcol=`<div class="poster"><img src="${bounty}" alt="${esc(f.name)} 懸賞水墨" loading="lazy"><span class="w">WANTED</span></div>`;}
    else if(imgSel==="p"&&portrait){artcol=`<div class="foeport"><img src="${portrait}" alt="${esc(f.name)} 立繪" loading="lazy"></div>`;}
    else{artcol=`<div class="noart"><span style="font-size:22px">◇</span>圖檔尚未備妥<span class="id">bounty_${f.id}.png</span></div>`;}
    const toggle=(bounty&&portrait)?`<div class="itoggle">
      <button data-act="fimg" data-id="${f.id}" data-v="b" class="${imgSel==="b"?"on":""}">懸賞圖</button>
      <button data-act="fimg" data-id="${f.id}" data-v="p" class="${imgSel==="p"?"on":""}">立繪</button></div>`:"";
    const pxfig=combat?`<div class="pxfig"><img src="${combat}" alt="${esc(f.name)} 戰鬥像素圖" loading="lazy"><span>遊戲內戰鬥圖</span></div>`:"";
    return `<div class="row foe${open?" open":""}" style="border-color:${open?"#c9b98b":(f.big?"rgba(231,195,116,.4)":"var(--line)")};background:${f.big?"linear-gradient(160deg,#1a1f38,#131a2e)":"var(--card)"}">
      <div class="head" data-act="tg" data-id="f_${f.id}" role="button" tabindex="0">
        <div class="thumb${onParch?" parch":""}"><img src="${thumb}" alt="${esc(f.name)}" loading="lazy" style="image-rendering:${combat?"pixelated":"auto"};mix-blend-mode:${onParch?"multiply":"normal"}"></div>
        <div class="meta"><div class="nm"><b>${f.big?"☠ ":""}${esc(f.name)}</b><span class="id">${f.id}</span>${feats}</div>
          <p class="lead2" style="margin:3px 0 0;font-size:12.5px">${esc(desc.split("。")[0]+"。")}</p></div>
        <div class="fstats">${fstats}</div>
        <div class="chev" style="transform:rotate(${open?0:-90}deg)">▾</div>
      </div>
      ${open?`<div class="exp foe">
        <div class="bar"><b>${f.big?"☠ ":""}${esc(f.name)}</b><span class="c-gdim mono" style="margin-left:auto;font-size:12px">討伐賞金 ${f.gold} G ・ EXP ${f.exp||"—"}</span></div>
        <div class="body">
          <div class="artcol">${artcol}${toggle}</div>
          <div class="info" style="flex:2 1 360px;min-width:270px">
            <p class="desc">${esc(desc)}</p>
            <div class="bigstats">${bigStats}</div>
            <div style="margin-top:12px;font-size:12.5px" class="c-mut"><b class="c-gold">掉落：</b>${esc(drops.join("、")||"—")}</div>
            <div style="margin-top:5px;font-size:12.5px" class="c-mut"><b class="c-gold">出沒：</b>${esc(hab.join("、")||"未配置遭遇")}</div>
            ${fsk?`<div class="foenote"><b class="c-bad">技能：</b>${esc(fsk)} <span class="c-dim">（發動 40%）</span></div>`:""}
            ${note?`<div style="margin-top:8px;font-size:12px" class="c-dim">※ ${esc(note)}</div>`:""}
          </div>
          ${pxfig}
        </div></div>`:""}
    </div>`;
  }).filter(Boolean);

  /* ── skills ── */
  const TGT={enemy:"敵單體",ally:"我方單體",all_enemies:"敵全體"};
  const skills=g.skills.map(s=>{
    const hay=[s.id,s.name,s.cls,s.attr].join(" ").toLowerCase();
    if(!mm(hay))return null; hits++;
    const chips=chip(CLSN[s.cls]||s.cls,"acc")+chip("Lv"+s.lv+" 習得")+chip("MP "+s.mp,"mp")+chip((s.kind==="heal"?"治療":"傷害")+"・"+(TGT[s.target]||s.target),s.kind==="heal"?"hp":"bad")+chip(s.attr.toUpperCase()+" 系","pur");
    const f=(s.kind==="heal"?"治療量":"傷害")+" = "+(s.attr==="int"?"魔攻":"物攻")+" × "+s.mult+" + "+fmt(s.flat)+(s.kind==="damage"?" − 敵防×0.6":"")+"（每級 +15%）";
    return `<div class="card"><div class="nm" style="display:flex;align-items:baseline;gap:9px;flex-wrap:wrap"><b class="mono" style="font-family:var(--serif);font-weight:900;font-size:15px">${esc(s.name)}</b><span class="id">${s.id}</span></div>
      <div class="tags" style="margin:8px 0">${chips}</div>
      <p class="mono c-mut" style="margin:0;font-size:11.5px">${esc(f)}</p></div>`;
  }).filter(Boolean);

  /* ── equipment ── */
  const attrRank={str:0,agi:1,int:2,"":3},rarOrder={common:0,uncommon:1,rare:2,epic:3};
  const eqGroups=["weapon","armor","wrist","boots","acc"].map(slot=>{
    const list=g.equipment.filter(e=>e.slot===slot).slice();
    list.sort((a,b)=>slot==="acc"?((rarOrder[a.rarity]-rarOrder[b.rarity])||(a.buy-b.buy)):((attrRank[a.attr||""]-attrRank[b.attr||""])||(a.buy-b.buy)));
    const rows=list.map(e=>{
      const hay=[e.id,e.name,e.slot,e.attr||"",e.rarity,e.desc||""].join(" ").toLowerCase();
      if(!mm(hay))return null; hits++;
      const rr=RAR[e.rarity]||["","c-faint"];
      return `<tr><td><b>${esc(e.name)}${e.tier===2?" Ⅱ":""}</b> <span class="${rr[1]}" style="font-family:var(--mono);font-size:10px">${rr[0]}</span><div class="id">${e.id}</div></td>
        <td style="white-space:nowrap"><span class="mono ${e.attr?ATTRC[e.attr]:"c-faint"}" style="font-size:11px">${e.attr?ATTRL[e.attr]:"—"}</span></td>
        <td class="mono" style="font-size:11.5px;color:#c3cdea">${esc(statTxt(e.stats))}</td>
        <td class="num">${e.buy} G</td><td class="num c-mut">${e.sell} G</td>
        <td class="c-mut" style="font-size:12.5px;min-width:200px">${esc(e.desc||"")}</td></tr>`;
    }).filter(Boolean);
    return {slot,label:SLOTL[slot],cnt:rows.length,rows:rows.join(""),hid:hasQ&&rows.length===0};
  }).filter(gr=>!gr.hid).map(gr=>{
    const open=hasQ?true:!!st.open["eqg_"+gr.slot];
    return `<div class="grp">
      <div class="gh" data-act="tg" data-id="eqg_${gr.slot}" role="button" tabindex="0">
        <span class="gchev" style="transform:rotate(${open?0:-90}deg)">▾</span><h4>${gr.label}</h4><span class="cnt">${gr.cnt} 件</span></div>
      ${open?`<div class="surface"><div class="tw"><table class="tbl" style="min-width:720px">
        <thead><tr><th style="width:190px">名稱</th><th style="width:80px">型</th><th>數值</th><th style="width:70px;text-align:right">買價</th><th style="width:70px;text-align:right">賣價</th><th>說明</th></tr></thead>
        <tbody>${gr.rows}</tbody></table></div></div>`:""}
    </div>`;
  }).join("");

  /* ── items ── */
  const itemGroups=[["consumable","消耗品"],["material","素材"],["key","重要物品"]].map(([cat,label])=>{
    const rows=g.items.filter(i=>i.cat===cat).map(i=>{
      const hay=[i.id,i.name,i.effect,cat,i.rarity].join(" ").toLowerCase();
      if(!mm(hay))return null; hits++;
      const rr=RAR[i.rarity]||["","c-faint"];
      return `<tr><td><b>${esc(i.name)}</b> <span class="${rr[1]}" style="font-family:var(--mono);font-size:10px">${cat==="key"?"":rr[0]}</span>${i.start?"（初始×"+i.start+"）":""}<div class="id">${i.id}</div></td>
        <td class="c-mut" style="font-size:12.5px">${esc(i.effect)}</td>
        <td class="num">${i.baseDrop>0?Math.round(i.baseDrop*100)+"%":"—"}</td>
        <td class="num">${i.buy!=null?i.buy+" G":"—"}</td><td class="num c-mut">${i.sell!=null?i.sell+" G":"—"}</td></tr>`;
    }).filter(Boolean);
    return {cat,label,cnt:rows.length,rows:rows.join(""),hid:hasQ&&rows.length===0};
  }).filter(gr=>!gr.hid).map(gr=>{
    const open=hasQ?true:!!st.open["itg_"+gr.cat];
    return `<div class="grp">
      <div class="gh" data-act="tg" data-id="itg_${gr.cat}" role="button" tabindex="0">

      ${open?`<div class="surface"><div class="tw"><table class="tbl" style="min-width:640px">
        <thead><tr><th style="width:200px">名稱</th><th>效果</th><th style="width:80px;text-align:right">掉落基數</th><th style="width:70px;text-align:right">買價</th><th style="width:70px;text-align:right">賣價</th></tr></thead>
        <tbody>${gr.rows}</tbody></table></div></div>`:""}
    </div>`;
  }).join("");

  /* ── shops ── */
  const shops=g.shops.map(sh=>{

      const e=eqById[id],it=itemById[id],nm=e?e.name:(it?it.name:id);

    }).filter(Boolean);
    if(hasQ&&rows.length===0)return null;
    return `<div class="card"><div class="nm" style="display:flex;align-items:baseline;gap:9px;flex-wrap:wrap"><b style="font-family:var(--serif);font-weight:900;font-size:16px">${esc(sh.name)}</b><span class="id">${sh.id}</span><span class="mono c-mut" style="font-size:11px">${rows.length} 項</span></div>

      <div style="max-height:420px;overflow-y:auto;border:1px solid var(--line-row);border-radius:10px"><table class="tbl" style="font-size:12.5px"><tbody>${rows.join("")}</tbody></table></div></div>`;
  }).filter(Boolean);

  /* ── world ── */
  const encStr=gr=>gr.members.map(m=>foeName(m.id)+"×"+(m.min===m.max?m.min:m.min+"~"+m.max)).join(" ＋ ");
  const TIERC={common:"c-mut",hidden:"c-acc",rare:"c-gold"},TIERL={common:"普通",hidden:"隱藏",rare:"稀有"};
  const maps=META.maps.map(m=>{
    const cfg=g.pacing.maps[m.id];
    let pacing=null;
    if(cfg){
      const groups=g.encounters[m.id];let scale=null;
      if(groups&&groups.length){
        const sums=groups.map(gr=>gr.members.reduce((s,mem)=>s+(foeById[mem.id]?(foeById[mem.id].exp||0)*(mem.min+mem.max)/2:0),0));
        const avg=sums.reduce((a,b)=>a+b,0)/sums.length;
        if(avg>0){let need=0;for(let lv=cfg.entryLv;lv<cfg.targetLv;lv++)need+=expNeed(lv);scale=Math.round((cfg.party!=null?cfg.party:g.pacing.partySize)*need/(cfg.battles*avg)*1000)/1000;}
      }
      pacing="Lv"+fmt(cfg.entryLv)+" → Lv"+fmt(cfg.targetLv)+" ・ 預計 "+fmt(cfg.battles)+" 戰"+(scale!=null?" ・ EXPSCALE "+scale:"");
    }
    const encs=(g.encounters[m.id]||[]).map(gr=>({w:fmt(gr.weight),t:encStr(gr)}));
    const chests=g.chests.filter(c=>c.map===m.id).map(c=>({tier:TIERL[c.tier]||c.tier,tc:TIERC[c.tier]||"c-mut",tx:c.tx,ty:c.ty,loot:c.loot.map(l=>l.type==="gold"?fmt(l.amount)+" G":((eqById[l.id]?eqById[l.id].name:(itemById[l.id]?itemById[l.id].name:l.id))+(l.count?"×"+fmt(l.count):""))).join("、")}));
    const hay=[m.id,m.name,m.scene,m.desc,encs.map(e=>e.t).join("")].join(" ").toLowerCase();
    if(!mm(hay))return null; hits++;
    const encHtml=encs.length?`<div class="c-dim" style="font-size:11px;letter-spacing:.08em;margin:8px 0 4px">遭遇編組（加權抽選）</div>`+encs.map(e=>`<div class="mapenc"><span class="mono c-gold" style="flex:none">w${e.w}</span><span style="color:#c3cdea">${esc(e.t)}</span></div>`).join(""):"";
    const chHtml=chests.length?`<div class="c-dim" style="font-size:11px;letter-spacing:.08em;margin:10px 0 4px">寶箱</div>`+chests.map(c=>`<div class="mapenc" style="flex-wrap:wrap"><span class="mono ${c.tc}" style="flex:none">${c.tier}</span><span class="mono c-faint" style="flex:none">(${c.tx},${c.ty})</span><span style="color:#c3cdea">${esc(c.loot)}</span></div>`).join(""):"";
    return `<div class="card"><div class="nm" style="display:flex;align-items:baseline;gap:9px;flex-wrap:wrap"><b style="font-family:var(--serif);font-weight:900;font-size:16px">${esc(m.name)}</b><span class="id">${m.scene}</span>${chip(m.kind==="town"?"城鎮":"野外")}</div>
      <p class="c-mut" style="margin:6px 0 8px;font-size:12.5px">${esc(m.desc)}</p>
      ${pacing?`<div class="mono c-acc" style="font-size:11.5px;margin-bottom:7px">${esc(pacing)}</div>`:""}${encHtml}${chHtml}</div>`;
  }).filter(Boolean);
  const events=encMapIds.filter(id=>!mapMeta[id]).map(id=>({id,name:mapName(id),comp:g.encounters[id].map(encStr).join("／"),note:(evMeta[id]||{}).note||""}));

  /* ── story ── */
  const cuts=Object.entries(dg.cuts).map(([key,c])=>{
    const hay=(key+" "+c.lines.map(l=>l.speaker+l.text).join("")).toLowerCase();
    if(!mm(hay))return null; hits++;
    const open=hasQ?true:!!st.open["cut_"+key];
    let meta="";
    if(c.battle)meta+=chip("battle: "+c.battle,"gold sm");
    if(c.transfer)meta+=chip("transfer: "+c.transfer.join(" · "),"gold sm");
    if(c.setstep!=null)meta+=chip("setstep: "+c.setstep,"gold sm");
    if(c.party)meta+=chip("party: "+JSON.stringify(c.party),"gold sm");
    const lines=c.lines.map(l=>`<div class="line"><span class="spk">${esc(l.speaker||"—")}</span><span style="color:${l.speaker?"var(--ink)":"var(--dim)"};font-size:${l.speaker?13:12.5}px">${esc(l.text)}</span></div>`).join("");
    return `<div class="scard">
      <div class="sh" data-act="tg" data-id="cut_${key}" role="button" tabindex="0">
        <span class="schev" style="transform:rotate(${open?0:-90}deg)">▾</span>
        <b class="mono c-ink" style="font-size:13px">${esc(key)}</b>
        ${c.once?chip("once: "+c.once,"sm"):""}${meta}
        <span class="mono c-faint" style="margin-left:auto;font-size:11px">${c.lines.length} 句</span></div>
      ${open?`<div class="sbody">${lines}</div>`:""}
    </div>`;
  }).filter(Boolean);
  const npcNameOf=id=>{const n=(META.npcs||[]).find(x=>x.id===id);if(n)return n.name;const arr=dg.dlg[id];return(arr&&arr[0]&&arr[0].speaker)||id;};
  const dlgs=Object.entries(dg.dlg).map(([id,arr])=>{
    const hay=(id+" "+npcNameOf(id)+" "+arr.map(e=>e.when+e.lines.join("")).join("")).toLowerCase();
    if(!mm(hay))return null; hits++;
    const open=hasQ?true:!!st.open["dlg_"+id];
    const entries=arr.map(e=>{
      const chips=chip(e.when,"acc sm")+[e.cmd,e.label,e.action?"action: "+e.action:null,e.done?"done: "+e.done:null].filter(Boolean).map(c=>chip(c,"sm")).join("");
      const lines=e.lines.map(t=>`<div class="l" style="color:${t.indexOf("（")===0?"var(--dim)":"#c3cdea"};font-size:${t.indexOf("（")===0?12.5:13}px">${esc(t)}</div>`).join("");
      return `<div class="dlge"><div class="cond">${chips}</div>${lines}</div>`;
    }).join("");
    return `<div class="scard">
      <div class="sh" data-act="tg" data-id="dlg_${id}" role="button" tabindex="0">
        <span class="schev" style="transform:rotate(${open?0:-90}deg)">▾</span>
        <b style="font-family:var(--serif);font-weight:900;font-size:15px">${esc(npcNameOf(id))}</b>
        <span class="id">${id}</span>
        <span class="mono c-faint" style="margin-left:auto;font-size:11px">${arr.length} 組條目</span></div>
      ${open?`<div class="dlgbody">${entries}</div>`:""}
    </div>`;
  }).filter(Boolean);

  /* ── 可見性 ── */
  const has={party:party.length,key:keys.length,npc:npcs.length,foe:foes.length,skill:skills.length,eq:eqGroups.length,item:itemGroups.length,shop:shops.length,world:maps.length,story:cuts.length+dlgs.length};
  const show=(id,isStatic)=>hasQ?(!isStatic&&has[id]>0):(mode==="tabs"?tab===id:true);
  const showHero=hasQ?false:(mode==="scroll"||tab==="ov");

  /* ── 組裝 HTML ── */
  const P=[];
  const secHead=(id,label,cnt,cls,en)=>`<div class="sec-h">${cls?`<h2>${label}${en?` <span class="en">${en}</span>`:""}</h2>`:`<h2>${label}</h2>`}${cnt?`<span class="cnt">${cnt}</span>`:""}</div>`;

  if(showHero)P.push(`<section class="hero"><img src="${IMG["p_ludo"]||""}" alt="">
    <div class="in"><div class="kick">TALE OF CRYSTAL — GODOT 4.7 EDITION</div>
    <h1>水晶傳說 設定集</h1>
    <p>十五歲的路德為查明恩人亞倫失蹤的真相，與青梅竹馬瑪琳一同踏上冒險。水晶碎片、封閉二十年的北方礦山、化為骷髏的失蹤礦工——黑影正在甦醒。</p>
    <div class="metarow">${chip("2 人隊伍（上限 4）","acc")}${chip("ATB 戰鬥")}${chip("單一存檔槽")}${chip("1280×720 設計基準 · 手繪風 · linear")}${chip("GDScript")}</div></div></section>`);

  if(show("ov",true))P.push(`<section class="sec" id="sec_ov">${secHead("ov","總覽")}
    <p class="lead">世界觀、章節主線與技術規格。旗標細節見「劇情與對話」，數值規則見「戰鬥公式」。</p>
    <div class="grid">${OV_CARDS.map(([h,d])=>`<div class="card"><h4>${esc(h)}</h4><p>${esc(d)}</p></div>`).join("")}</div>
    <h3 class="sub">主線流程</h3><div class="flow">${FLOW.map(s=>`<div class="step"><div class="dot"></div><div class="t"><b>${esc(s.t)}</b> ${chip(s.fl,"sm")}<br>${esc(s.d)}</div></div>`).join("")}</div>
    <h3 class="sub">技術規格</h3><div class="surface"><div class="tw"><table class="tbl"><tbody>${TECH.map(([k,v])=>`<tr><td style="width:160px;white-space:nowrap" class="c-mut">${esc(k)}</td><td>${esc(v)}</td></tr>`).join("")}</tbody></table></div></div></section>`);

  if(show("party"))P.push(`<section class="sec" id="sec_party">${secHead("party","主角隊伍",party.length+" 名")}
    <p class="lead">衍生數值由公式 F-1 計算（含初始裝備）。屬性點：每級 +3 自由分配；技能點：每級 +1，技能上限 Lv10（每級威力 +15%）。點列展開完整檔案。</p>
    <div class="rows">${party.join("")}</div></section>`);

  if(show("key"))P.push(`<section class="sec pur" id="sec_key">${secHead("key","關鍵角色",keys.length+" 名","pur","KEY FIGURES")}
    <p class="lead">不時出現在劇情中、扮演關鍵角色的核心人物——非常駐鎮民、也不只是敵人。戰鬥數值（若有）見「敵人圖鑑」。</p>
    <div class="rows">${keys.join("")}${!hasQ?`<div class="stub"><span style="font-size:20px" class="c-faint">◇</span>未來核心角色（待設計）<span class="id">於 META.keyChars 新增即出現</span></div>`:""}</div></section>`);

  if(show("npc"))P.push(`<section class="sec" id="sec_npc">${secHead("npc","NPC 圖鑑",npcs.length+" 名")}
    <p class="lead">全員常駐芳蕾鎮。對話依旗標由上而下擇一觸發（先寫後期條件），完整台詞見「劇情與對話」。點列展開全身立繪。</p>
    <div class="grid-npc">${npcs.join("")}</div></section>`);

  if(show("foe"))P.push(`<section class="sec gold" id="sec_foe">${secHead("foe","敵人圖鑑",foes.length+" 種","gold","GUILD BOUNTY")}
    <p class="lead">DEF 為物理防禦；敵人魔防以 DEF×0.5 計、閃避以 SPD×1.5 計、會心一律 6.25%（F-3～F-5）。☠ 為頭目（big）：血條不顯示數字。掉落顯示「最終機率（×倍率）」＝道具掉落基數 × 怪物倍率，上限 100%（F-10）。<b>點列攤開公會懸賞單。</b></p>
    <div class="rows">${foes.join("")}</div></section>`);

  if(show("skill"))P.push(`<section class="sec" id="sec_skill">${secHead("skill","技能",skills.length+" 招")}
    <p class="lead">傷害 =（基值×倍率＋固定值）×技能等級加成 − 敵防×0.6，浮動 0.85–1.00；治療無防禦修正。基值：str/agi 系吃物攻、int 系吃魔攻。技能不判閃避。</p>
    <div class="grid">${skills.join("")}</div></section>`);

  if(show("eq"))P.push(`<section class="sec" id="sec_eq">${secHead("eq","裝備",g.equipment.length+" 件")}
    <p class="lead">六個裝備格：武器／防具／護腕／靴子／飾品×2。武器・防具・靴子各分<b>力量／敏捷／法力三型 × 8 階曲線</b>（5~8 階＝II，ch2 旗標後上架）——型別只是分類標籤，不限制誰能裝。稀有度為 UI 色階，不影響數值。賣價＝買價 30%。點分類標題可收合。</p>
    ${eqGroups}</section>`);

  if(show("item"))P.push(`<section class="sec" id="sec_item">${secHead("item","道具",g.items.length+" 種")}
    <p class="lead">戰鬥中可用的道具僅限回復 HP／MP 兩類（F-6）。「掉落基數」＝base_drop_rate，每個物品各別設定（0＝不從戰鬥掉落）；稀有度不參與掉落計算，只是填值慣例＋UI 色階。怪物端 drops[].rate 為加乘倍率，見 F-10。</p>
    ${itemGroups}</section>`);

  if(show("shop"))P.push(`<section class="sec" id="sec_shop">${secHead("shop","商店",shops.length+" 間")}
    <p class="lead">買賣完成時自動存檔。賣出任何裝備／道具一律以其 sell 價成交。</p>
    <div class="grid-npc">${shops.join("")}</div></section>`);

  if(show("world"))P.push(`<section class="sec" id="sec_world">${secHead("world","地圖與地區",maps.length+" 張")}
    <p class="lead">節奏參數（pacing）定義每張圖的進場等級→目標等級與預計戰鬥數，EXP 縮放係數由此推得（F-9，現場計算）。寶箱座標為圖塊座標（tx, ty）。</p>
    <div class="grid-npc">${maps.join("")}</div>
    <h3 class="sub">事件戰・頭目編成</h3><div class="surface"><div class="tw"><table class="tbl"><tbody>${events.map(e=>`<tr><td style="white-space:nowrap"><b>${esc(e.name)}</b><div class="id">${e.id}</div></td><td style="color:#c3cdea;font-size:12.5px">${esc(e.comp)}</td><td class="c-mut" style="font-size:12px">${esc(e.note)}</td></tr>`).join("")}</tbody></table></div></div></section>`);

  if(show("formula",true)){
    const derivedRows=Object.entries(g.derived).map(([k,v])=>`<tr><td class="mono c-acc" style="font-size:11.5px;white-space:nowrap">${k}</td><td class="num" style="width:90px">${fmt(v)}</td><td class="c-mut">${esc(DERL[k]||"")}</td></tr>`).join("");
    P.push(`<section class="sec" id="sec_formula">${secHead("formula","戰鬥公式")}
      <p class="lead">摘錄自 specs/BATTLE_FORMULAS.md v2.0。F-1～F-9 抄錄自 GDevelop build_cq2.py（附行號可回溯）；F-10 為 Godot 端刻意新增的平衡設計（2026-07-15 遊玩回饋調整）。</p>
      ${FORMULAS.map(f=>`<div class="formula"><h4><span class="no">${f.no}</span>${esc(f.t)}</h4>${f.code?`<pre>${esc(f.code)}</pre>`:""}${f.d?`<p>${esc(f.d)}</p>`:""}</div>`).join("")}
      <h4 style="margin:0 0 10px">成長常數（derived.tres）</h4><div class="surface"><div class="tw"><table class="tbl" style="font-size:12.5px"><tbody>${derivedRows}</tbody></table></div></div></section>`);
  }

  if(show("system",true))P.push(`<section class="sec" id="sec_system">${secHead("system","系統規格")}
    <p class="lead">摘錄自 specs/SAVE_SCHEMA.md v1.1 與 specs/DIALOGUE_SPEC.md v1.1。</p>
    <h4 style="margin:0 0 10px">全域狀態（GameState）</h4>
    <div class="surface" style="margin-bottom:20px"><div class="tw"><table class="tbl" style="font-size:12.5px;min-width:560px"><thead><tr><th>欄位</th><th>型別</th><th>內容</th><th>持久化</th></tr></thead><tbody>${GSTATE.map(r=>`<tr><td class="mono c-acc" style="font-size:11.5px;white-space:nowrap">${esc(r[0])}</td><td class="c-mut" style="white-space:nowrap">${esc(r[1])}</td><td style="color:#c3cdea">${esc(r[2])}</td><td class="c-mut">${esc(r[3])}</td></tr>`).join("")}</tbody></table></div></div>
    ${SYSNOTES.map(n=>`<div style="margin-bottom:18px"><h4 style="margin:0 0 6px">${esc(n[0])}</h4><p class="c-mut" style="margin:0;font-size:13px;max-width:88ch">${esc(n[1])}</p></div>`).join("")}
    <h4 style="margin:0 0 10px">對話 action 一覽</h4><div class="surface"><div class="tw"><table class="tbl" style="font-size:12.5px"><tbody>${ACTIONS.map(a=>`<tr><td class="mono c-acc" style="font-size:11.5px;white-space:nowrap">${esc(a[0])}</td><td style="color:#c3cdea">${esc(a[1])}</td></tr>`).join("")}</tbody></table></div></div></section>`);

  if(show("story"))P.push(`<section class="sec pur" id="sec_story">${secHead("story","劇情與對話")}
    <p class="lead">過場（CUTS）與 NPC 對話全文，取自 dialogue .tres 真相源。過場預設展開、NPC 對話預設收合；對話依旗標由上而下取第一個成立的條目。</p>
    <h3 class="sub">過場（CUTS）<span class="mono c-mut" style="font-size:12px;font-weight:400">　${cuts.length} 段</span></h3>
    <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:30px">${cuts.join("")}</div>
    <h3 class="sub">NPC 對話（DLG）<span class="mono c-mut" style="font-size:12px;font-weight:400">　${dlgs.length} 名</span></h3>
    <div style="display:flex;flex-direction:column;gap:9px">${dlgs.join("")}</div></section>`);

  const main=document.getElementById("main");
  main.innerHTML=P.length
    ? P.join("")+`<footer>水晶傳說 Tale of Crystal · 團隊內部設定資料庫 · 資料快照 tools/codex/data.json · 數值由 build_codex.py 解析 <span class="mono">content_db.tres</span> 產生，變動後重跑產生器即更新。</footer>`
    : `<div class="empty">沒有符合「${esc(st.q)}」的條目。</div>`;

  /* ── header 動態 ── */
  document.getElementById("sbox").classList.toggle("hasq",hasQ);
  document.getElementById("hits").textContent="命中 "+hits+" 筆";
  const mb=document.getElementById("modeBtn");
  mb.textContent=(mode==="tabs"?"☰":"⿻")+" 切換："+(mode==="tabs"?"長卷模式":"檔案室分頁");
  document.querySelectorAll("#tabs button").forEach(b=>{
    const on=mode==="tabs"&&!hasQ&&b.dataset.id===tab;
    b.classList.toggle("on",on);
  });
}

/* ══════════ 事件 ══════════ */
function goTab(id){
  const st=state,hasQ=!!st.q.trim();
  if(st.mode==="tabs"&&!hasQ){st.tab=id;render();window.scrollTo({top:0});}
  else{const el=document.getElementById("sec_"+id);if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-118,behavior:"smooth"});}
}
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-act]");if(!t)return;
  const act=t.dataset.act;
  if(act==="tg"){const id=t.dataset.id;state.open[id]=!state.open[id];render();}
  else if(act==="fimg"){state.open["fi_"+t.dataset.id]=t.dataset.v;render();}
  else if(act==="tab"){goTab(t.dataset.id);}
  else if(act==="mode"){const m=state.mode==="tabs"?"scroll":"tabs";try{localStorage.setItem("cq_codex_mode",m);}catch(x){}state.mode=m;render();window.scrollTo({top:0});}
  else if(act==="qclear"){state.q="";document.getElementById("q").value="";render();document.getElementById("q").focus();}
});
document.addEventListener("keydown",e=>{
  const t=e.target.closest("[data-act]");
  if(t&&(e.key==="Enter"||e.key===" ")&&t.dataset.act==="tg"){e.preventDefault();state.open[t.dataset.id]=!state.open[t.dataset.id];render();}
  const q=document.getElementById("q");
  if(e.key==="/"&&document.activeElement!==q){e.preventDefault();q.focus();}
  if(e.key==="Escape"&&document.activeElement===q){state.q="";q.value="";render();q.blur();}
});
document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value;render();});
document.getElementById("qc").dataset.act="qclear";
document.getElementById("modeBtn").dataset.act="mode";

/* ══════════ init ══════════ */
(function init(){
  let saved=null;try{saved=localStorage.getItem("cq_codex_mode");}catch(e){}
  state.mode=saved||(window.innerWidth<880?"scroll":"tabs");
  Object.keys(DLG.cuts||{}).forEach(k=>{state.open["cut_"+k]=true;});
  ["weapon","armor","wrist","boots","acc"].forEach(s=>{state.open["eqg_"+s]=true;});
  ["consumable","material","key"].forEach(c=>{state.open["itg_"+c]=true;});
  const tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML=SECS.map(([id,label])=>`<button data-act="tab" data-id="${id}">${label}</button>`).join("");
  render();
})();
</script>
